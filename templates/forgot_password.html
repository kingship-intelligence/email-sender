<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — RushMail</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-layout">
  <div class="auth-card">
    <div class="auth-brand"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="RushMail" class="auth-brand__logo" /><strong>Rush<span style="color:#000;">Mail</span></strong></div>
    <h1 class="auth-title">Reset password</h1>
    <p class="auth-sub">Enter your email and we'll send a reset link</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash--{{ cat }}">{{ msg | safe }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
      </div>
      <button type="submit" class="btn btn--primary btn--full">Send reset link</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('login') }}">← Back to sign in</a></p>
  </div>
</body>
</html>
