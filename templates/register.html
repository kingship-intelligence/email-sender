<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — MailBlast</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-layout">
  <div class="auth-card">
    <div class="auth-brand"><strong>Mail<span style="color:#000;">Blast</span></strong></div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start sending smarter campaigns today</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash--{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8" />
      </div>
      <div class="field">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2" placeholder="••••••••" required minlength="8" />
      </div>
      <button type="submit" class="btn btn--primary btn--full">Create account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</body>
</html>
