<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RushMail</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-layout">
  <div class="auth-card">
    <div class="auth-brand"><img src="{{ url_for('static', filename='img/logo.png') }}" alt="RushMail" class="auth-brand__logo" /><strong>Rush<span style="color:#000;">Mail</span></strong></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash--{{ cat }}">{{ msg | safe }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus autocomplete="email" />
      </div>
      <div class="field">
        <label for="password" style="display:flex;justify-content:space-between;align-items:center">
          Password
          <a href="{{ url_for('forgot_password') }}" class="auth-forgot">Forgot password?</a>
        </label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign in</button>
    </form>
    <p class="auth-switch">No account? <a href="{{ url_for('register') }}">Create one</a></p>
  </div>
</body>
</html>
